name: ClashX

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

env:
  FASTLANE_SKIP_UPDATE_CHECK: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: macos-latest
    steps:

    - uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.1'
        bundler-cache: true

    # 临时禁用证书导入，使用自动签名
    # - name: import certs
    #   run: |
    #     echo `/usr/bin/xcodebuild -version`
    #     openssl aes-256-cbc -k  "${{ secrets.ENCRYPTION_SECRET }}" -in ".github/certs/dist.p12.enc" -d -a -out ".github/certs/dist.p12" -md md5
    - name: setup Go
      uses: actions/setup-go@v3
      with:
        go-version: 1.21.x

    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: install deps
      env:
        GIT_TERMINAL_PROMPT: 0
      run: |
        bash install_dependency.sh

    - name: update dev build version
      if: ${{!startsWith(github.ref, 'refs/tags/')}}
      run: |
        tag=`git describe --abbrev=0`.`date '+%m%d%H%M%S'`
        bundle exec fastlane run increment_build_number_in_plist build_number:"${tag}"  scheme:"ClashX"
        bundle exec fastlane run increment_version_number_in_plist version_number:"${tag}"  scheme:"ClashX"
        bundle exec fastlane run set_info_plist_value path:ClashX/Info.plist key:BETA value:true

    - name: update tag build version
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        tag=${GITHUB_REF##*/}
        bundle exec fastlane run set_info_plist_value path:ClashX/Info.plist key:BETA value:false
        bundle exec fastlane run increment_build_number_in_plist build_number:"${tag}"  scheme:"ClashX"
        bundle exec fastlane run increment_version_number_in_plist version_number:"${tag}"  scheme:"ClashX"

    - name: prepare release notes
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        tag=${GITHUB_REF##*/}
        python3 scripts/generate_release_notes.py "$tag" release_notes.md
        echo "Prepared release notes:"
        cat release_notes.md

    - name: build
      run: |
        cd ClashX
        python3 add_build_info.py
        cd ..

        # Build using xcodebuild directly for better control
        echo "Building ClashX..."
        xcodebuild clean build \
          -workspace ClashX.xcworkspace \
          -scheme ClashX \
          -configuration Release \
          -derivedDataPath ./build_derived_data \
          CODE_SIGN_IDENTITY="-" \
          ENABLE_HARDENED_RUNTIME=NO

        # Find the built .app
        echo "Looking for built app..."
        APP_PATH=$(find ./build_derived_data/Build/Products/Release -name "ClashX.app" -type d | head -n 1)

        if [ -z "$APP_PATH" ]; then
          echo "Error: ClashX.app not found!"
          echo "Searching in all build directories..."
          find ./build_derived_data -name "ClashX.app" -type d
          exit 1
        fi

        echo "Found app at: $APP_PATH"
        echo "Copying to root directory..."
        cp -R "$APP_PATH" ./ClashX.app

        # Find and zip the dSYM
        echo "Looking for dSYM..."
        DSYM_PATH=$(find ./build_derived_data/Build/Products/Release -name "ClashX.app.dSYM" -type d | head -n 1)
        if [ -n "$DSYM_PATH" ]; then
          echo "Found dSYM at: $DSYM_PATH"
          echo "Zipping dSYM..."
          ditto -c -k --sequesterRsrc --keepParent "$DSYM_PATH" ClashX.app.dSYM.zip
        else
          echo "Warning: dSYM not found, skipping..."
        fi

        echo "Checking SMJobBless Vailded"
        python3 SMJobBlessUtil.py check ClashX.app || echo "SMJobBless check skipped"
        echo "Build complete!"

    - name: free disk space
      run: |
        rm -rf build_derived_data
        rm -rf ~/Library/Developer/Xcode/DerivedData
        echo "Freed disk space: $(df -h / | tail -1 | awk '{print $4}') available"

    - name: create dmg
      if: startsWith(github.ref, 'refs/tags/') || contains(github.event.head_commit.message, '[beta]')
      run: |
        echo "Checking for ClashX.app..."
        ls -la ClashX.app

        if [ ! -d "ClashX.app" ]; then
          echo "Error: ClashX.app not found!"
          exit 1
        fi

        echo "Creating DMG with hdiutil..."
        # Create a temporary folder for DMG contents
        mkdir -p dmg_temp
        cp -R ClashX.app dmg_temp/

        # Create Applications folder symlink
        ln -s /Applications dmg_temp/Applications

        # Create the DMG
        hdiutil create -volname "ClashX" -srcfolder dmg_temp -ov -format UDZO ClashX.dmg

        # Clean up
        rm -rf dmg_temp

        echo "Checking for created DMG..."
        ls -la ClashX.dmg

        if [ -f "ClashX.dmg" ]; then
          echo "DMG created successfully: ClashX.dmg"
        else
          echo "Error: DMG creation failed!"
          exit 1
        fi

    - name: sign dmg with sparkle
      if: startsWith(github.ref, 'refs/tags/')
      env:
        SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      run: |
        SIGN_OUTPUT=$(echo "$SPARKLE_PRIVATE_KEY" | ./Pods/Sparkle/bin/sign_update --ed-key-file - ClashX.dmg)
        echo "Sparkle signature output: $SIGN_OUTPUT"

        SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
        LENGTH=$(echo "$SIGN_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')

        if [ -z "$SIGNATURE" ] || [ -z "$LENGTH" ]; then
          echo "Error: Failed to parse signature or length"
          echo "Raw output: $SIGN_OUTPUT"
          exit 1
        fi

        echo "SPARKLE_SIGNATURE=$SIGNATURE" >> $GITHUB_ENV
        echo "SPARKLE_LENGTH=$LENGTH" >> $GITHUB_ENV
        echo "Signed successfully: signature=${SIGNATURE:0:20}... length=$LENGTH"

    # 临时禁用公证步骤（需要 Apple Developer 账号）
    # - name: notarize
    #   if: startsWith(github.ref, 'refs/tags/')  || contains(github.event.head_commit.message, '[beta]')
    #   env:
    #     FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
    #     FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
    #     FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
    #   run: |
    #     bundle exec fastlane run notarize package:"./ClashX.dmg" bundle_id:"com.west2online.ClashX" asc_provider:MEWHFZ92DY

    # 临时禁用 AppCenter 上传（需要配置 token）
    # - name: upload to appcenter
    #   if: startsWith(github.ref, 'refs/tags/') || contains(github.event.head_commit.message, '[beta]')
    #   env:
    #     APPCENTER_DISTRIBUTE_UPLOAD_BUILD_ONLY: true
    #     APPCENTER_DISTRIBUTE_DESTINATIONS: Public
    #     APPCENTER_APP_NAME: ClashX
    #     APPCENTER_API_TOKEN: ${{ secrets.APPCENTER_API_TOKEN }}
    #     APPCENTER_DISTRIBUTE_FILE: ClashX.dmg
    #     APPCENTER_OWNER_NAME: ${{ secrets.APPCENTER_OWNER_NAME }}
    #     APPCENTER_DISTRIBUTE_DSYM: "ClashX.app.dSYM.zip"
    #     APPCENTER_DISTRIBUTE_RELEASE_NOTES: ${{ github.event.head_commit.message }}
    #   run: |
    #     appversion=`defaults read \`pwd\`/ClashX.app/Contents/Info.plist CFBundleShortVersionString`
    #     buildVersion=`defaults read \`pwd\`/ClashX.app/Contents/Info.plist CFBundleVersion`
    #     branch=${GITHUB_REF##*/}
    #     version=$appversion.$branch
    #     bundle exec fastlane run appcenter_upload version:${version} build_number:${buildVersion}

    - name: upload build to github
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        body_path: release_notes.md
        files: |
            ClashX.app.dSYM.zip
            ClashX.dmg
        draft: false
        prerelease: false

    - name: update appcast.xml
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        tag=${GITHUB_REF##*/}
        python3 - "$tag" "$SPARKLE_SIGNATURE" "$SPARKLE_LENGTH" <<'PYEOF'
        import html
        import sys, re
        from datetime import datetime, timezone
        from pathlib import Path

        tag, signature, length = sys.argv[1], sys.argv[2], sys.argv[3]
        pub_date = datetime.now(timezone.utc).strftime("%a, %d %b %Y %H:%M:%S %z")

        notes_md = Path("release_notes.md").read_text(encoding="utf-8") if Path("release_notes.md").exists() else ""
        note_lines = [line.strip() for line in notes_md.splitlines() if line.strip()]
        summary = []
        for line in note_lines[:12]:
            if line.startswith(("#", "##", "###")):
                continue
            if line.startswith(("- ", "* ")):
                summary.append(f"<li>{html.escape(line[2:])}</li>")
            else:
                summary.append(f"<p>{html.escape(line)}</p>")
        notes_html = f"<h2>ClashX v{tag}</h2>"
        if summary:
            if all(item.startswith("<li>") for item in summary):
                notes_html += "<ul>" + "".join(summary) + "</ul>"
            else:
                notes_html += "".join(summary)
        else:
            notes_html += "<p>See release notes on GitHub.</p>"

        new_item = f"""    <item>
          <title>Version {tag}</title>
          <description><![CDATA[
            {notes_html}
          ]]></description>
          <pubDate>{pub_date}</pubDate>
          <sparkle:version>{tag}</sparkle:version>
          <sparkle:shortVersionString>{tag}</sparkle:shortVersionString>
          <sparkle:minimumSystemVersion>10.14</sparkle:minimumSystemVersion>
          <enclosure
            url="https://github.com/ClashX-Pro/ClashX/releases/download/{tag}/ClashX.dmg"
            sparkle:version="{tag}"
            sparkle:shortVersionString="{tag}"
            sparkle:edSignature="{signature}"
            length="{length}"
            type="application/octet-stream"
          />
        </item>"""

        with open("docs/appcast.xml") as f:
            xml = f.read()

        marker = "<language>en</language>"
        xml = xml.replace(marker, marker + "\n" + new_item, 1)

        with open("docs/appcast.xml", "w") as f:
            f.write(xml)

        print(f"Updated appcast.xml with version {tag}")
        PYEOF

    - name: push appcast update
      if: startsWith(github.ref, 'refs/tags/')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG=${GITHUB_REF##*/}
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add docs/appcast.xml
        git commit -m "release: update appcast.xml for v${TAG} [skip ci]"
        git push origin HEAD:master
        echo "Appcast updated successfully"

    - name: notify website repos
      if: always() && startsWith(github.ref, 'refs/tags/')
      env:
        WEBSITE_PAT: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
      run: |
        tag=${GITHUB_REF##*/}
        DATE=$(date -u +%Y-%m-%d)
        NOTES=$(python3 -c 'import json, pathlib; p = pathlib.Path("release_notes.md"); text = p.read_text(encoding="utf-8") if p.exists() else ""; print(json.dumps("\\n".join(text.splitlines()[:80])))')

        # Build website summary from the previous stable tag to match history card version.
        CHANGE_TYPE="fix"
        DESC_EN=""
        DESC_ZH=""
        PREV_TAG=$(python3 -c 'import subprocess, sys; current = sys.argv[1]; out = subprocess.check_output(["git", "tag", "--sort=-version:refname"], text=True); tags = [t.strip() for t in out.splitlines() if t.strip()]; print(next((tags[i + 1] for i, t in enumerate(tags) if t == current and i + 1 < len(tags)), ""))' "$tag")

        if [ -n "$PREV_TAG" ]; then
          python3 scripts/generate_release_notes.py "$PREV_TAG" website_prev_release_notes.md || true
        fi

        if [ -f website_prev_release_notes.md ]; then
          SUMMARY_JSON=$(python3 - <<'PY'
import json
import re
from pathlib import Path

text = Path("website_prev_release_notes.md").read_text(encoding="utf-8")
sections = {}
current = None
for line in text.splitlines():
    if line.startswith("### "):
        current = line.strip()
        sections[current] = []
    elif current is not None:
        sections[current].append(line.rstrip())

target_heading = "### New Features / 新功能" if "### New Features / 新功能" in sections else "### Bug Fixes / 问题修复"
change_type = "feat" if target_heading.startswith("### New Features") else "fix"
target_lines = sections.get(target_heading, [])

indented = [line.strip() for line in target_lines if line.startswith("  ") and line.strip()]
desc_en = next((line for line in indented if not re.search(r"[\u4e00-\u9fff]", line)), "")
desc_zh = next((line for line in indented if re.search(r"[\u4e00-\u9fff]", line)), "")

if not desc_en:
    desc_en = next(
        (
            re.sub(r"^- \*\*(.+?)\*\*$", r"\1", line.strip())
            for line in target_lines
            if line.strip().startswith("- **")
        ),
        "",
    )

if not desc_zh:
    desc_zh = next((line for line in indented if line), "")

print(json.dumps({
    "change_type": change_type,
    "desc_en": desc_en,
    "desc_zh": desc_zh,
}, ensure_ascii=False))
PY
)
          CHANGE_TYPE=$(jq -r '.change_type' <<< "$SUMMARY_JSON")
          DESC_EN=$(jq -r '.desc_en' <<< "$SUMMARY_JSON")
          DESC_ZH=$(jq -r '.desc_zh' <<< "$SUMMARY_JSON")
        fi

        DESC_EN=${DESC_EN:-"See release notes on GitHub"}
        DESC_ZH=${DESC_ZH:-"详见 GitHub Release Notes"}

        PAYLOAD=$(jq -n \
          --arg version "$tag" \
          --arg date "$DATE" \
          --arg product "clashx" \
          --arg change_type "$CHANGE_TYPE" \
          --arg desc_en "$DESC_EN" \
          --arg desc_zh "$DESC_ZH" \
          --argjson notes "$NOTES" \
          '{
            event_type: "clashx-release",
            client_payload: {
              product: $product,
              version: $version,
              date: $date,
              change_type: $change_type,
              desc_en: $desc_en,
              desc_zh: $desc_zh,
              release_notes: $notes,
              download_url: "https://github.com/ClashX-Pro/ClashX/releases/download/\($version)/ClashX.dmg"
            }
          }')

        curl -sf -X POST \
          -H "Authorization: token $WEBSITE_PAT" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/mixc6763-prog/ClashX.Web/dispatches \
          -d "$PAYLOAD" && echo "Notified ClashX.Web" || echo "Failed to notify ClashX.Web"
